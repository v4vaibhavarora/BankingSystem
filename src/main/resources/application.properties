# ============================================
# BANKING SYSTEM - APPLICATION CONFIGURATION
# ============================================

spring.application.name=BankingSystem
server.port=8080

# ============================================
# MySQL (XAMPP) - Update credentials if needed
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/banking_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Email (Gmail SMTP) - Fill in your credentials
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=aroravaibhav249@gmail.com
spring.mail.password=ouowyrmlmnbfnkop
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
bank.mail.from=YOUR_EMAIL@gmail.com
bank.name=SecureBank

# ============================================
# Thymeleaf
# ============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# Session timeout: 30 minutes
server.servlet.session.timeout=1800

# Logging
logging.level.com.banking=DEBUG
logging.level.org.hibernate.SQL=WARN
