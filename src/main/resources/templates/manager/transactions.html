<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Transactions - SecureBank</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="bank-name"><span class="icon">&#127970;</span> SecureBank</div>
      <div class="tagline">Manager Administration</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Management</div>
      <a href="/manager/dashboard" class="nav-link"><span class="nav-icon">&#127968;</span> Dashboard</a>
      <a href="/manager/kyc-pending" class="nav-link"><span class="nav-icon">&#128203;</span> KYC Requests</a>
      <a href="/manager/customers" class="nav-link"><span class="nav-icon">&#128101;</span> All Customers</a>
      <a href="/manager/transactions" class="nav-link active"><span class="nav-icon">&#128200;</span> Transactions</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/manager/logout" class="nav-link" style="color:rgba(255,100,100,.8)"><span class="nav-icon">&#128682;</span> Logout</a>
    </div>
  </aside>
  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">All Transactions</span>
      <div class="topbar-user">
        <div class="user-avatar">M</div>
        <span style="font-size:14px;font-weight:600">Manager</span>
      </div>
    </div>
    <div class="page-body">
      <div class="page-header d-flex justify-between align-center">
        <div><h1>Transaction Monitor</h1><p th:text="${#lists.size(transactions)} + ' total transactions | Volume: &#8377;' + ${#numbers.formatDecimal(totalVolume,1,'COMMA',2,'POINT')}"></p></div>
        <input type="text" id="searchBox" placeholder="Search transactions..." style="width:260px;padding:10px 14px">
      </div>

      <div class="card">
        <div th:if="${#lists.isEmpty(transactions)}" class="empty-state">
          <div class="empty-icon">&#128200;</div>
          <h3>No transactions yet</h3>
        </div>
        <div th:if="${!#lists.isEmpty(transactions)}" class="table-wrapper">
          <table id="txTable">
            <thead>
              <tr><th>ID</th><th>Date</th><th>Sender</th><th>Recipient</th><th>Amount</th><th>Description</th><th>Status</th></tr>
            </thead>
            <tbody>
              <tr th:each="tx : ${transactions}">
                <td class="text-sm text-muted" th:text="${tx.id}"></td>
                <td>
                  <div style="font-size:13px;font-weight:500" th:text="${#temporals.format(tx.createdAt,'dd MMM yyyy')}"></div>
                  <div class="text-sm text-muted" th:text="${#temporals.format(tx.createdAt,'HH:mm:ss')}"></div>
                </td>
                <td>
                  <div style="font-weight:600;font-size:14px" th:text="${tx.senderName}"></div>
                  <div class="text-sm text-muted" style="font-family:monospace" th:text="${tx.senderAccountNumber}"></div>
                </td>
                <td>
                  <div style="font-weight:600;font-size:14px" th:text="${tx.recipientName}"></div>
                  <div class="text-sm text-muted" style="font-family:monospace" th:text="${tx.recipientAccountNumber}"></div>
                </td>
                <td class="fw-bold" style="color:#0f2b5c"
                    th:text="'&#8377;' + ${#numbers.formatDecimal(tx.amount,1,'COMMA',2,'POINT')}"></td>
                <td class="text-sm" th:text="${tx.description}"></td>
                <td><span class="badge badge-approved">&#10003; SUCCESS</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
document.getElementById('searchBox')?.addEventListener('input', function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('#txTable tbody tr').forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});
</script>
</body>
</html>
