<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KYC Registration — SecureBank</title>
<link rel="stylesheet" href="/css/style.css">
<style>
body { background: linear-gradient(135deg,#0f2b5c,#1565c0); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.reg-container { width:100%; max-width:540px; background:white; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,.2); overflow:hidden; }
.reg-header { background:linear-gradient(135deg,#0f2b5c,#1565c0); padding:32px 40px 24px; text-align:center; }
.reg-header h1 { color:white; font-size:22px; }
.reg-header p { color:rgba(255,255,255,.6); font-size:13px; margin-top:4px; }
.reg-body { padding:36px 40px; }
.steps { display:flex; gap:8px; margin-bottom:28px; }
.step { flex:1; height:4px; border-radius:2px; background:#e2e8f0; }
.step.active { background:#1565c0; }
.kyc-badge { background:#e3f2fd; color:#1565c0; border:1px solid #90caf9; border-radius:8px; padding:12px 16px; margin-bottom:24px; font-size:13px; }
.kyc-badge strong { display:block; margin-bottom:4px; }
</style>
</head>
<body>
<div class="reg-container fade-in">
  <div class="reg-header">
    <div style="font-size:40px;margin-bottom:8px">📋</div>
    <h1>KYC Registration</h1>
    <p>New Account Application — SecureBank</p>
  </div>
  <div class="reg-body">
    <div class="kyc-badge">
      <strong>ℹ️ How it works</strong>
      Submit your KYC → Manager reviews → Account approved → Credentials sent to email
    </div>
    <div th:if="${error}" class="alert alert-error">⚠️ <span th:text="${error}"></span></div>
    <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>
    <form method="POST" action="/customer/register">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="fullName" placeholder="As per government ID" required minlength="3">
      </div>
      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>PAN Number *</label>
          <input type="text" name="pan" placeholder="ABCDE1234F" maxlength="10" style="text-transform:uppercase" required>
        </div>
        <div class="form-group">
          <label>Aadhaar Number *</label>
          <input type="text" name="aadhaar" placeholder="12-digit Aadhaar" maxlength="12" required pattern="[0-9]{12}">
        </div>
      </div>
      <div style="background:#f8fafc;border-radius:8px;padding:14px;margin-bottom:20px;font-size:13px;color:#475569">
        🔒 Your data is encrypted and stored securely. Initial status will be <strong>PENDING</strong> until manager approval.
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Submit KYC Application →</button>
    </form>
  </div>
  <div style="background:#f8fafc;border-top:1px solid #e2e8f0;padding:16px 40px;text-align:center;font-size:13px;color:#94a3b8">
    Already have an account? <a href="/customer/login" style="color:#1565c0;font-weight:600">Login here</a>
  </div>
</div>
</body>
</html>
